site_name: Kafka Adapter Plus
site_description: Custom Apache Kafka adapter for SAP Cloud Integration (CPI)
repo_url: https://github.com/finkeflo/cpi-kafka-adapter-plus
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/branding/icon.png
  favicon: assets/branding/icon.png
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Features:
      - Batch Processing: features/batch-processing.md
      - Avro / Schema Registry: features/avro-schema-registry.md
      - Producer Batch Send: features/producer-batch.md
  - Security:
      - Authentication: security/authentication.md
  - Architecture Decisions:
      - "ADR 0001: Transactional Concurrency": adrs/0001-transactional-producer-concurrency.md
  - Changelog: changelog.md
