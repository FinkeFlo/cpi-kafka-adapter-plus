<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: transparent; margin: 0; padding: 40px; }
    </style>
</head>
<body>

    <!-- Kafka Adapter Plus - Header Logo -->
    <div class="flex items-center space-x-8 bg-white p-10 rounded-3xl shadow-2xl border border-slate-100">
        <!-- Icon Block -->
        <div class="relative w-32 h-32 bg-blue-600 rounded-[2rem] flex items-center justify-center shadow-lg overflow-hidden border-b-[6px] border-blue-800">
            <!-- Glossy top highlight for depth -->
            <div class="absolute top-0 left-0 w-full h-2 bg-blue-400 opacity-50"></div>

            <!-- Central Icon Text -->
            <span class="text-white text-6xl font-black tracking-tighter leading-none pr-1">K+</span>
        </div>

        <!-- Text Block -->
        <div class="flex flex-col">
            <div class="flex items-baseline space-x-3">
                <span class="text-5xl font-black text-slate-800 tracking-tight uppercase">Kafka Adapter</span>
                <span class="text-5xl font-black text-orange-500 italic transform -skew-x-6">plus</span>
            </div>
            <div class="flex items-center mt-3">
                <div class="h-[3px] w-12 bg-blue-600 mr-4 rounded-full"></div>
                <span class="text-lg font-bold text-slate-500 tracking-[0.15em] uppercase">for Sap Cloud integration</span>
            </div>
        </div>
    </div>

</body>
</html>
