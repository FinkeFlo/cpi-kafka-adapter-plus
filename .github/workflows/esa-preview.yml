name: ESA Preview

on:
  workflow_dispatch:

jobs:
  build-test-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build, test and package (produces the ESA)
        run: mvn -B clean install

      - name: Locate ESA artifact
        id: esa
        run: |
          ESA="$(find target -name '*.esa' | head -1)"
          if [ -z "$ESA" ]; then
            echo "::error::No .esa archive was produced by the build"
            exit 1
          fi
          echo "path=$ESA" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$ESA")" >> "$GITHUB_OUTPUT"
          echo "Found ESA: $ESA"
          # Create artifact name with branch and timestamp (replace / with -)
          BRANCH_SAFE="$(echo "${{ github.ref_name }}" | tr '/' '-')"
          TIMESTAMP="$(date -u +'%Y%m%d-%H%M')"
          ARTIFACT_NAME="esa-${BRANCH_SAFE}-${TIMESTAMP}"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload ESA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.esa.outputs.artifact_name }}
          path: ${{ steps.esa.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Job summary
        run: |
          {
            echo "### ESA preview build finished"
            echo ""
            echo "- **Branch/Ref:** \`${GITHUB_REF_NAME}\`"
            echo "- **ESA:** \`${{ steps.esa.outputs.name }}\`"
            echo "- **Download:** Actions Run Artifacts"
          } >> "$GITHUB_STEP_SUMMARY"
