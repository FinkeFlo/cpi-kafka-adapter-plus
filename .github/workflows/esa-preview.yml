name: ESA Preview

on:
  workflow_dispatch:

jobs:
  build-test-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags are required so `git describe` can derive a
          # meaningful build version (e.g. 1.0.3-6-g92e03c8).
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build, test and package (produces the ESA)
        run: mvn -B clean install

      - name: Locate ESA and compute artifact name
        id: esa
        run: |
          ESA="$(find target -name '*.esa' | head -1)"
          if [ -z "$ESA" ]; then
            echo "::error::No .esa archive was produced by the build"
            exit 1
          fi

          # Product name = Maven artifactId, derived from the built file name by
          # stripping the trailing "-<version>" (version always starts with a digit).
          ESA_BASE="$(basename "$ESA" .esa)"
          PRODUCT="$(printf '%s' "$ESA_BASE" | sed -E 's/-[0-9].*$//')"

          # Build version via git describe:
          #   - on a release tag  -> e.g. 1.0.3
          #   - past a tag         -> e.g. 1.0.3-6-g92e03c8 (clearly a dev build)
          #   - no tag at all      -> short commit sha
          DESCRIBE="$(git describe --tags --always --dirty | sed 's/^v//')"

          # Branch name, filesystem-safe (slashes are not allowed in artifact names).
          BRANCH_SAFE="$(printf '%s' "${GITHUB_REF_NAME}" | tr '/' '-')"

          ARTIFACT_NAME="${PRODUCT}-${DESCRIBE}-${BRANCH_SAFE}"

          # Rename the .esa so the file inside the download matches the artifact name.
          NEW_ESA="$(dirname "$ESA")/${ARTIFACT_NAME}.esa"
          mv "$ESA" "$NEW_ESA"

          echo "path=$NEW_ESA" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "esa_file=${ARTIFACT_NAME}.esa" >> "$GITHUB_OUTPUT"
          echo "Renamed ESA to: $NEW_ESA"

      - name: Upload ESA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.esa.outputs.artifact_name }}
          path: ${{ steps.esa.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Job summary
        run: |
          {
            echo "### ESA preview build finished"
            echo ""
            echo "- **Branch/Ref:** \`${GITHUB_REF_NAME}\`"
            echo "- **Artifact (zip):** \`${{ steps.esa.outputs.artifact_name }}\`"
            echo "- **ESA file:** \`${{ steps.esa.outputs.esa_file }}\`"
            echo "- **Download:** Actions Run Artifacts"
          } >> "$GITHUB_STEP_SUMMARY"
