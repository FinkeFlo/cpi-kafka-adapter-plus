name: Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Unit tests (Surefire)
        run: mvn -B test

  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      # Run every shard to completion so a failure in one shard still reports the others.
      fail-fast: false
      matrix:
        shard: [0, 1, 2]
    env:
      SHARD_TOTAL: 3
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Deterministically split the *IT classes across shards by round-robin over the
      # sorted class list. New *IT classes are picked up automatically (no manual list to
      # maintain); FullVolumeIT stays excluded to mirror the Failsafe configuration.
      - name: Select integration test classes for shard ${{ matrix.shard }}
        id: select
        run: |
          all=()
          while IFS= read -r cls; do all+=("$cls"); done \
            < <(find src/test/java -name '*IT.java' ! -name 'FullVolumeIT.java' -exec basename {} .java ';' | sort)
          sel=()
          for i in "${!all[@]}"; do
            if [ $(( i % SHARD_TOTAL )) -eq ${{ matrix.shard }} ]; then sel+=("${all[$i]}"); fi
          done
          if [ ${#sel[@]} -eq 0 ]; then
            echo "::error::No integration test classes assigned to shard ${{ matrix.shard }} — check SHARD_TOTAL vs. class count"
            exit 1
          fi
          joined=$(IFS=,; echo "${sel[*]}")
          echo "Shard ${{ matrix.shard }}/${SHARD_TOTAL} runs ${#sel[@]} classes: ${joined}"
          echo "tests=${joined}" >> "$GITHUB_OUTPUT"

      - name: Integration tests (Failsafe, Testcontainers/Docker) + package
        run: mvn -B verify -Dskip.unit.tests=true -Dit.test="${{ steps.select.outputs.tests }}"

  osgi-resolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Runs the real OSGi resolver check in an ESA-producing build path.
      - name: OSGi resolver check (ESA standalone bundles)
        run: mvn -B clean install -Dskip.unit.tests=true -Dit.test=OsgiFrameworkResolveIT -Dosgi.resolution.requireEsa=true

  # Aggregating gate: keeps the required status check named "build" stable, so branch
  # protection needs no change. Always runs and fails if any test job did not succeed
  # (a skipped/failed dependency is treated as a failure).
  build:
    needs: [unit-tests, integration-tests, osgi-resolution]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all test jobs to pass
        run: |
          echo "unit-tests=${{ needs.unit-tests.result }} integration-tests=${{ needs.integration-tests.result }} osgi-resolution=${{ needs.osgi-resolution.result }}"
          if [ "${{ needs.unit-tests.result }}" != "success" ] || [ "${{ needs.integration-tests.result }}" != "success" ] || [ "${{ needs.osgi-resolution.result }}" != "success" ]; then
            echo "::error::One or more test jobs did not succeed"
            exit 1
          fi
          echo "All test jobs passed."
