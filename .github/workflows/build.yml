name: Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Unit tests (Surefire)
        run: mvn -B test

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Integration tests (Failsafe, Testcontainers/Docker) + package
        run: mvn -B verify -Dskip.unit.tests=true

  # Aggregating gate: keeps the required status check named "build" stable, so branch
  # protection needs no change. Always runs and fails if any test job did not succeed
  # (a skipped/failed dependency is treated as a failure).
  build:
    needs: [unit-tests, integration-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all test jobs to pass
        run: |
          echo "unit-tests=${{ needs.unit-tests.result }} integration-tests=${{ needs.integration-tests.result }}"
          if [ "${{ needs.unit-tests.result }}" != "success" ] || [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "::error::One or more test jobs did not succeed"
            exit 1
          fi
          echo "All test jobs passed."
