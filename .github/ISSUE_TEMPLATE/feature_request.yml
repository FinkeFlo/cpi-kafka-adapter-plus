name: Feature request
description: Suggest an enhancement for the adapter
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to achieve? What is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
