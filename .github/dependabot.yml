# Dependabot configuration
# Keeps Maven dependencies (pom.xml) and GitHub Actions up to date.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # --- Maven dependencies (pom.xml) ---
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "java"
    commit-message:
      prefix: "build"
      include: "scope"
    # CPI provides Camel at runtime; keep Camel upgrades out of automatic updates.
    # Enterprise adapter: prioritize stability over new features, so major
    # version bumps are excluded from automatic PRs and must be reviewed/
    # upgraded manually and deliberately.
    ignore:
      - dependency-name: "org.apache.camel:*"
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
      # org.lz4:lz4-java 1.8.1+ is a Maven relocation stub pointing to
      # at.yawk.lz4:lz4-java, the OSGi-broken fork banned by the
      # ban-cpi-incompatible-dependencies enforcer rule in pom.xml. Stay on
      # 1.8.0, the last version published under the real org.lz4 coordinates.
      - dependency-name: "org.lz4:lz4-java"
    # Bundle low-risk minor/patch bumps into a single PR to reduce noise;
    # major upgrades are excluded above and handled manually.
    groups:
      maven-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # --- GitHub Actions used in .github/workflows ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
